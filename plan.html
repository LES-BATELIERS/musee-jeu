<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan — Nuit Blanche</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
/* Animations clignotement */
@keyframes clignRougeJaune {
  0%,100% { background:rgba(120,12,12,0.82); border-color:#aa1818; color:#ff5555; }
  50%     { background:rgba(140,100,0,0.88); border-color:#ccaa00; color:#ffcc00; }
}
@keyframes clignJauneVert {
  0%,100% { background:rgba(140,100,0,0.88); border-color:#ccaa00; color:#ffcc00; }
  50%     { background:rgba(0,110,35,0.85);  border-color:#00bb44; color:#00ff55; }
}
@keyframes fi { from{opacity:0} to{opacity:1} }

body { background:#080808; font-family:sans-serif; padding:10px; min-height:100vh; }
.plan-titre { text-align:center; font-size:9px; color:#6b6355; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px; }
.leg { display:flex; gap:10px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
.li { display:flex; align-items:center; gap:5px; font-size:7px; color:#6b6355; letter-spacing:1px; text-transform:uppercase; }
.ld { width:9px; height:9px; border-radius:2px; }
.wrap { position:relative; width:100%; }
.wrap img { width:100%; display:block; border-radius:6px; }

.salle {
  position:absolute; border-radius:3px;
  display:flex; flex-direction:column;
  align-items:flex-start; justify-content:flex-start;
  font-size:5px; font-weight:700;
  letter-spacing:0.3px; line-height:1.3;
  padding:2px 3px; cursor:default; min-width:22px;
}

/* États statiques */
.nf  { background:rgba(120,12,12,0.82); border:1px solid #aa1818; color:#ff5555; }
.ec  { background:rgba(140,100,0,0.88); border:1px solid #ccaa00; color:#ffcc00; }
.ok  { background:rgba(0,110,35,0.85);  border:1px solid #00bb44; color:#00ff55; }
.neu { background:rgba(20,18,12,0.5);   border:1px solid #2a2520; color:#4a4540; }

/* Animations de transition */
.anim-rj { border:1px solid #aa1818; animation: clignRougeJaune 0.5s ease-in-out 6; }
.anim-jv { border:1px solid #ccaa00; animation: clignJauneVert  0.5s ease-in-out 6; }

.btn-retour {
  display:block; margin:12px auto 0;
  background:transparent; border:1px solid #3a3530;
  border-radius:8px; padding:8px 20px;
  color:#8a8070; font-size:11px;
  letter-spacing:0.15em; text-transform:uppercase; cursor:pointer;
}
.btn-retour:hover { border-color:#8a8070; color:#f0ead8; }
</style>
</head>

<script src="js/game.js?v=2"></script>
<script src="data/parcours.js?v=2"></script>
<script>
const etapeMap = {"intro-guide": "s41", "horloge-1759": "s42", "perroquet": "s5", "joseph-ii": "s6", "horloge-salon-rouge": "s8b", "putti-astrologue": "s23b", "vieux-gardien": "s29a", "lampe-magique": "s29b", "dromadaire": "s15", "licorne-classique": "s18"};

// Lire le paramètre URL : ?mode=qr (arrivée QR) ou ?mode=reussi (énigme réussie)
const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode'); // 'qr' | 'reussi' | null

function getInfoSalle(id, etat) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'salle ' + etat;
  const nom = el.dataset.nom;
  const spanNom = el.querySelector('.m');
  if (etat === 'ok') {
    spanNom.style.display = 'block';
  } else {
    spanNom.style.display = 'none';
  }
}

function animerSalle(id, animClass, etatFinal, nomVisible) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'salle ' + animClass;
  const spanNom = el.querySelector('.m');
  // Après la fin de l'animation (6 cycles × 0.5s = 3s) → état final
  setTimeout(() => {
    el.className = 'salle ' + etatFinal;
    if (nomVisible) spanNom.style.display = 'block';
  }, 3100);
}

function majPlan() {
  if (typeof GAME === 'undefined') return;
  const s = GAME.getSession();
  if (!s.parcours) return;

  const toutesEtapes = [
    ...PARCOURS.commun,
    ...(s.parcours === 'pmr' ? PARCOURS.pmr : PARCOURS.classique)
  ];

  let indexCourant = 0;
  if (s.phase === 'commun') indexCourant = s.etape;
  else indexCourant = PARCOURS.commun.length + s.etape;

  const indiceAffiche = localStorage.getItem('indiceAffiche') === '1';
  // indexValide = étapes vraiment terminées
  const indexValide = indiceAffiche ? indexCourant + 1 : indexCourant;
  // L'étape "active" = celle en cours (indexValide)
  const idEtapeActive = toutesEtapes[indexValide] ? toutesEtapes[indexValide].id : null;
  const idSalleActive = idEtapeActive ? etapeMap[idEtapeActive] : null;

  // Placer toutes les salles dans leur état de base
  toutesEtapes.forEach((etape, i) => {
    const id = etapeMap[etape.id];
    if (!id) return;
    if (i < indexValide)        getInfoSalle(id, 'ok');
    else if (i === indexValide) getInfoSalle(id, 'ec');
    else                        getInfoSalle(id, 'nf');
  });

  // Masquer salles mauvais parcours
  if (s.parcours !== 'pmr') ['s23b','s29a'].forEach(id => getInfoSalle(id, 'neu'));
  if (s.parcours === 'pmr') ['s15','s18'].forEach(id => getInfoSalle(id, 'neu'));

  // === ANIMATIONS selon le mode ===

  // Mode QR : le joueur vient de scanner → la salle active clignote rouge→jaune
  if (mode === 'qr' && idSalleActive) {
    animerSalle(idSalleActive, 'anim-rj', 'ec', false);
  }

  // Mode réussi : l'énigme vient d'être réussie → la salle précédente clignote jaune→vert
  if (mode === 'reussi') {
    // La salle qui vient d'être réussie = indexValide - 1
    const idEtapeReussie = toutesEtapes[indexValide - 1] ? toutesEtapes[indexValide - 1].id : null;
    const idSalleReussie = idEtapeReussie ? etapeMap[idEtapeReussie] : null;
    if (idSalleReussie) {
      animerSalle(idSalleReussie, 'anim-jv', 'ok', true);
    }
  }
}

function retourJeu() {
  const retour = sessionStorage.getItem('retourEnigme');
  if (retour) {
    sessionStorage.removeItem('retourEnigme');
    window.location.href = retour;
  } else {
    history.back();
  }
}

window.onload = function() {
  majPlan();
  // En mode reussi → le bouton apparaît après l'animation (3s)
  if (mode === 'reussi') {
    document.getElementById('btnRetour').style.display = 'none';
    setTimeout(() => {
      document.getElementById('btnRetour').style.display = 'block';
    }, 3200);
  }
};
</script>
</body>
</html>
