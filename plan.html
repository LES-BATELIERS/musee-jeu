<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Plan — Nuit Blanche</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
@keyframes clignJauneVert {
  0%,100%{background:rgba(140,100,0,0.9);border-color:#ddaa00;color:#ffcc00;}
  50%    {background:rgba(0,130,45,0.9); border-color:#00cc44;color:#00ff66;}
}
html,body{margin:0;padding:0;background:#080808;font-family:sans-serif;width:100%;}
body{padding:12px;box-sizing:border-box;}

.plan-titre{text-align:center;font-size:11px;color:#6b6355;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
.leg{display:flex;gap:12px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:#6b6355;letter-spacing:1px;text-transform:uppercase;}
.ld{width:11px;height:11px;border-radius:2px;}
.section-label{font-size:9px;color:#4a4540;letter-spacing:2px;text-transform:uppercase;margin:14px 0 6px;}

.plan-section{position:relative;width:100%;margin-bottom:4px;}
.plan-section img{width:100%;height:auto;display:block;border-radius:6px;}

.salle{
  position:absolute;border-radius:3px;
  display:flex;flex-direction:column;
  align-items:flex-start;justify-content:flex-start;
  font-weight:700;letter-spacing:0.3px;line-height:1.2;
  padding:2px 4px;cursor:default;white-space:nowrap;
  font-size:11px;
  border:1px solid;
}
.nf {background:rgba(120,12,12,0.88);border-color:#cc2020;color:#ff7777;}
.ok {background:rgba(0,130,45,0.9); border-color:#00cc44;color:#00ff66;}
.neu{background:rgba(20,18,12,0.5); border-color:#2a2520;color:#4a4540;}
.anim-jv{border-color:#ddaa00 !important;animation:clignJauneVert 0.5s ease-in-out 6;}

.btn-retour{
  display:block;margin:18px auto 24px;
  background:transparent;border:1px solid #3a3530;
  border-radius:8px;padding:14px;
  color:#8a8070;font-size:13px;
  letter-spacing:0.15em;text-transform:uppercase;
  cursor:pointer;width:100%;max-width:400px;
  box-sizing:border-box;
}
.btn-retour:hover{border-color:#8a8070;color:#f0ead8;}
</style>
</head>

<button class="btn-retour" id="btnRetour" onclick="retourJeu()">← Continuer le jeu</button>

<script src="js/game.js?v=2"></script>
<script src="data/parcours.js?v=2"></script>
<script>
const etapeMap = {"intro-guide": "s41", "horloge-1759": "s42", "perroquet": "s5", "joseph-ii": "s6", "horloge-salon-rouge": "s8b", "putti-astrologue": "s23b", "vieux-gardien": "s29a", "lampe-magique": "s29b", "dromadaire": "s15", "licorne-classique": "s18"};
const mode = new URLSearchParams(window.location.search).get('mode');

function setEtat(id, etat, nomVisible) {
  const el = document.getElementById(id);
  if (!el || el.classList.contains('leurre')) return;
  el.className = 'salle ' + etat;
  const m = el.querySelector('.m');
  if (m) m.style.display = nomVisible ? 'block' : 'none';
}

function animerSalle(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'salle anim-jv';
  setTimeout(() => {
    el.className = 'salle ok';
    const m = el.querySelector('.m');
    if (m) m.style.display = 'block';
  }, 3200);
}

function majPlan() {
  if (typeof GAME === 'undefined') return;
  const s = GAME.getSession();
  if (!s.parcours) return;

  const toutesEtapes = [
    ...PARCOURS.commun,
    ...(s.parcours === 'pmr' ? PARCOURS.pmr : PARCOURS.classique)
  ];

  let indexCourant = 0;
  if (s.phase === 'commun') indexCourant = s.etape;
  else indexCourant = PARCOURS.commun.length + s.etape;

  const indiceAffiche = localStorage.getItem('indiceAffiche') === '1';
  const indexValide = indiceAffiche ? indexCourant + 1 : indexCourant;

  toutesEtapes.forEach((etape, i) => {
    const id = etapeMap[etape.id];
    if (!id) return;
    if (i < indexValide) setEtat(id, 'ok', true);
    else                 setEtat(id, 'nf', false);
  });

  if (s.parcours !== 'pmr') ['s23b','s29a'].forEach(id => setEtat(id, 'neu', false));
  if (s.parcours === 'pmr') ['s15','s18'].forEach(id => setEtat(id, 'neu', false));

  if (mode === 'reussi') {
    const idR = toutesEtapes[indexValide-1] ? etapeMap[toutesEtapes[indexValide-1].id] : null;
    if (idR) animerSalle(idR);
    document.getElementById('btnRetour').style.display = 'none';
    setTimeout(() => document.getElementById('btnRetour').style.display = 'block', 3400);
  }
}

function retourJeu() {
  const retour = sessionStorage.getItem('retourEnigme');
  if (retour) { sessionStorage.removeItem('retourEnigme'); window.location.href = retour; }
  else history.back();
}

window.onload = majPlan;
</script>
