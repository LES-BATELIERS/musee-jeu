<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan — Nuit Blanche</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
@keyframes clignJauneVert {
  0%,100% { background:rgba(140,100,0,0.9); border-color:#ddaa00; color:#ffcc00; }
  50%     { background:rgba(0,120,40,0.9);  border-color:#00cc44; color:#00ff66; }
}
body { background:#080808; font-family:sans-serif; padding:12px; }
.plan-titre { text-align:center; font-size:10px; color:#6b6355; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
.leg { display:flex; gap:12px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
.li { display:flex; align-items:center; gap:5px; font-size:8px; color:#6b6355; letter-spacing:1px; text-transform:uppercase; }
.ld { width:10px; height:10px; border-radius:2px; }
.section-label { font-size:8px; color:#4a4540; letter-spacing:2px; text-transform:uppercase; margin:10px 0 4px; padding-left:2px; }
.plan-section { position:relative; width:100%; margin-bottom:6px; }
.plan-section img { width:100%; display:block; border-radius:6px; }
.salle {
  position:absolute; border-radius:3px;
  display:flex; flex-direction:column;
  align-items:flex-start; justify-content:flex-start;
  font-size:7px; font-weight:700;
  letter-spacing:0.3px; line-height:1.3;
  padding:2px 4px; cursor:default; min-width:20px;
}
.nf  { background:rgba(120,12,12,0.85);  border:1px solid #cc2020; color:#ff6666; }
.ok  { background:rgba(0,120,40,0.88);   border:1px solid #00cc44; color:#00ff66; }
.neu { background:rgba(20,18,12,0.5);    border:1px solid #2a2520; color:#4a4540; }
.anim-jv { border:1px solid #ddaa00; animation:clignJauneVert 0.5s ease-in-out 6; }
.btn-retour {
  display:block; margin:14px auto 0;
  background:transparent; border:1px solid #3a3530;
  border-radius:8px; padding:10px 24px;
  color:#8a8070; font-size:12px;
  letter-spacing:0.15em; text-transform:uppercase; cursor:pointer;
  width:100%; max-width:320px;
}
.btn-retour:hover { border-color:#8a8070; color:#f0ead8; }
</style>
</head>

<script>
const etapeMap = {"intro-guide": "s41", "horloge-1759": "s42", "perroquet": "s5", "joseph-ii": "s6", "horloge-salon-rouge": "s8b", "putti-astrologue": "s23b", "vieux-gardien": "s29a", "lampe-magique": "s29b", "dromadaire": "s15", "licorne-classique": "s18"};
const mode = new URLSearchParams(window.location.search).get('mode');

function setEtat(id, etat, nomVisible) {
  const el = document.getElementById(id);
  if (!el || el.classList.contains('leurre')) return;
  el.className = 'salle ' + etat;
  const m = el.querySelector('.m');
  if (m) m.style.display = nomVisible ? 'block' : 'none';
}

function animerSalle(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'salle anim-jv';
  setTimeout(() => {
    el.className = 'salle ok';
    const m = el.querySelector('.m');
    if (m) m.style.display = 'block';
  }, 3200);
}

function majPlan() {
  if (typeof GAME === 'undefined') return;
  const s = GAME.getSession();
  if (!s.parcours) return;

  const toutesEtapes = [
    ...PARCOURS.commun,
    ...(s.parcours === 'pmr' ? PARCOURS.pmr : PARCOURS.classique)
  ];

  let indexCourant = 0;
  if (s.phase === 'commun') indexCourant = s.etape;
  else indexCourant = PARCOURS.commun.length + s.etape;

  const indiceAffiche = localStorage.getItem('indiceAffiche') === '1';
  const indexValide = indiceAffiche ? indexCourant + 1 : indexCourant;

  toutesEtapes.forEach((etape, i) => {
    const id = etapeMap[etape.id];
    if (!id) return;
    if (i < indexValide) setEtat(id, 'ok', true);
    else                 setEtat(id, 'nf', false);
  });

  // Masquer salles mauvais parcours
  if (s.parcours !== 'pmr') ['s23b','s29a'].forEach(id => setEtat(id, 'neu', false));
  if (s.parcours === 'pmr') ['s15','s18'].forEach(id => setEtat(id, 'neu', false));

  // Animation réussite jaune→vert
  if (mode === 'reussi') {
    const idReussie = toutesEtapes[indexValide - 1] ? etapeMap[toutesEtapes[indexValide - 1].id] : null;
    if (idReussie) animerSalle(idReussie);
    document.getElementById('btnRetour').style.display = 'none';
    setTimeout(() => document.getElementById('btnRetour').style.display = 'block', 3400);
  }
}

function retourJeu() {
  const retour = sessionStorage.getItem('retourEnigme');
  if (retour) { sessionStorage.removeItem('retourEnigme'); window.location.href = retour; }
  else history.back();
}

window.onload = majPlan;
</script>
