<script src="js/game.js?v=2"></script>
<script src="data/parcours.js?v=2"></script>
<script>
// Noms selon le parcours
const NOMS_CLASSIQUE = ['Le Guide','Le Perroquet','Joseph II','H. Salon Rouge','Horloge figée','Le Dromadaire','La Licorne','La Lampe'];
const NOMS_PMR       = ['Le Guide','Le Perroquet','Joseph II','H. Salon Rouge','Horloge figée','Putti Astrologue','Vieux Gardien','La Lampe'];

const PTS = [
  {x:90,y:95},{x:255,y:135},{x:80,y:195},{x:265,y:255},
  {x:90,y:315},{x:255,y:383},{x:100,y:453},{x:225,y:513},{x:180,y:578}
];

const mode = new URLSearchParams(window.location.search).get('mode');

function getNoms() {
  if (typeof GAME === 'undefined') return NOMS_CLASSIQUE;
  const s = GAME.getSession();
  return s.parcours === 'pmr' ? NOMS_PMR : NOMS_CLASSIQUE;
}

function getValidated() {
  if (typeof GAME === 'undefined') return 0;
  const s = GAME.getSession();
  if (!s.parcours) return 0;
  const indiceAffiche = localStorage.getItem('indiceAffiche') === '1';
  let idx = 0;
  if (s.phase === 'commun') idx = s.etape;
  else idx = PARCOURS.commun.length + s.etape;
  return indiceAffiche ? idx + 1 : idx;
}

function initParcours() {
  if (typeof GAME === 'undefined') return;
  const s = GAME.getSession();
  const isPMR = s.parcours === 'pmr';

  // Sous-titre
  const label = isPMR ? 'parcours PMR' : (s.parcours === 'enfants' ? 'parcours Enfants' : 'parcours Famille');
  document.getElementById('sousTitre').textContent = '~ ' + label + ' ~';

  // Décos étape 6 et 7 selon parcours
  const d6c = document.getElementById('deco6-classique');
  const d6p = document.getElementById('deco6-pmr');
  const d7c = document.getElementById('deco7-classique');
  const d7p = document.getElementById('deco7-pmr');

  if (isPMR) {
    d6c.style.display = 'none'; d6c.setAttribute('opacity','0');
    d6p.style.display = 'block'; d6p.setAttribute('opacity','0.45');
    d7c.style.display = 'none'; d7c.setAttribute('opacity','0');
    d7p.style.display = 'block'; d7p.setAttribute('opacity','0.45');
  } else {
    d6c.style.display = 'block'; d6c.setAttribute('opacity','0.45');
    d6p.style.display = 'none'; d6p.setAttribute('opacity','0');
    d7c.style.display = 'block'; d7c.setAttribute('opacity','0.45');
    d7p.style.display = 'none'; d7p.setAttribute('opacity','0');
  }
}

function renderAll() {
  const NOMS = getNoms();
  const v = getValidated();
  for (let i=0; i<NOMS.length; i++) updateEtape(i, NOMS, v);
  updateChemin(v);
  updateCoffre(v, NOMS.length);
}

function updateEtape(i, NOMS, v) {
  const c  = document.getElementById('c'+i);
  const tn = document.getElementById('t'+i+'n');
  const tl = document.getElementById('t'+i+'l');
  if (!c) return;
  if (i < v) {
    c.setAttribute('fill','#003010'); c.setAttribute('stroke','#00992e'); c.style.animation='';
    tn.setAttribute('fill','#00dd44'); tl.setAttribute('fill','#00aa33');
    tl.textContent = NOMS[i];
  } else if (i === v) {
    c.setAttribute('fill','#3a0808'); c.setAttribute('stroke','#8a2020');
    c.style.animation='pulseRouge 2s ease-in-out infinite';
    tn.setAttribute('fill','#dd4444'); tl.setAttribute('fill','#aa3030');
    tl.textContent = NOMS[i];
  } else {
    c.setAttribute('fill','#1c1408'); c.setAttribute('stroke','#3a2808'); c.style.animation='';
    tn.setAttribute('fill','#3a2808'); tl.setAttribute('fill','#3a2808');
    tl.textContent = '???';
  }
}

function updateChemin(v) {
  document.querySelectorAll('.seg').forEach(e=>e.remove());
  const svg  = document.getElementById('carte');
  const base = document.getElementById('chemin-base');
  for (let i=0; i<v && i<PTS.length-1; i++) {
    const a=PTS[i], b=PTS[i+1];
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const seg = document.createElementNS('http://www.w3.org/2000/svg','path');
    seg.setAttribute('d',`M${a.x},${a.y} Q${mx+8},${my-8} ${b.x},${b.y}`);
    seg.setAttribute('fill','none');
    seg.setAttribute('stroke','#00992e');
    seg.setAttribute('stroke-width','2');
    seg.setAttribute('stroke-dasharray','6 4');
    seg.setAttribute('class','seg');
    seg.style.animation='dashFlow 0.8s linear infinite';
    svg.insertBefore(seg, base);
  }
}

function updateCoffre(v, total) {
  const g = document.getElementById('coffre');
  if (v >= total) {
    g.style.animation='coffreBat 0.8s ease-in-out infinite';
    g.querySelectorAll('rect').forEach(r=>r.setAttribute('stroke','#cc9920'));
    g.querySelector('text').setAttribute('fill','#cc9920');
  } else {
    g.style.animation='';
  }
}

function animerReussite() {
  const v = getValidated();
  if (v === 0) return;
  const c = document.getElementById('c'+(v-1));
  if (!c) return;
  c.style.animation='rougeVert 1.5s ease forwards';
  setTimeout(renderAll, 1700);
}

function retourJeu() {
  const retour = sessionStorage.getItem('retourEnigme');
  if (retour) { sessionStorage.removeItem('retourEnigme'); window.location.href = retour; }
  else history.back();
}

window.onload = function() {
  initParcours();
  renderAll();
  if (mode === 'reussi') animerReussite();
};
</script>

  const s=40; d.style.width=s+'px'; d.style.height=s+'px';
  d.style.left=(e.clientX-s/2)+'px'; d.style.top=(e.clientY-s/2)+'px';
  document.body.appendChild(d); d.addEventListener('animationend',()=>d.remove());

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
let scanning = false;
let animFrame = null;
let stream = null;
let detected = false;

function toggleScanner() {
  const wrap = document.getElementById('scannerWrap');
  if (wrap.style.display === 'none') ouvrirScanner();
  else fermerScanner();
}

function ouvrirScanner() {
  detected = false;
  document.getElementById('scannerWrap').style.display = 'block';
  document.getElementById('btnScanner').textContent = '✕ Fermer le scanner';
  document.getElementById('btnScanner').style.color = '#6b6355';
  demarrerCamera();
}

function fermerScanner() {
  document.getElementById('scannerWrap').style.display = 'none';
  document.getElementById('btnScanner').textContent = '✦ Scanner le prochain QR code';
  document.getElementById('btnScanner').style.color = '#8a6030';
  arreterCamera();
}

function demarrerCamera() {
  const video = document.getElementById('video');
  const constraints = {
    video: {
      facingMode: { ideal: 'environment' },
      width:  { ideal: 1920 },
      height: { ideal: 1080 }
    }
  };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(s => {
      stream = s;
      video.srcObject = s;
      video.setAttribute('playsinline', true);
      video.play()
        .then(() => {
          scanning = true;
          requestAnimationFrame(scannerFrame);
        });
    })
    .catch(err => {
      document.getElementById('scanMsg').textContent = 'Accès caméra refusé';
      console.error('Camera error:', err);
    });
}

function arreterCamera() {
  scanning = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('video');
  video.srcObject = null;
}

function scannerFrame() {
  if (!scanning || detected) return;

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // Attendre que la vidéo soit prête
  if (video.readyState < 2 || video.videoWidth === 0) {
    animFrame = requestAnimationFrame(scannerFrame);
    return;
  }

  // Redimensionner le canvas à la taille de la vidéo
  if (canvas.width !== video.videoWidth) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let imageData;
  try {
    imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  } catch(e) {
    animFrame = requestAnimationFrame(scannerFrame);
    return;
  }

  // Essayer les 4 modes d'inversion pour maximiser la détection
  const modes = ['dontInvert','onlyInvert','attemptBoth','invertFirst'];
  let code = null;
  for (const mode of modes) {
    code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: mode
    });
    if (code) break;
  }

  if (code && code.data) {
    detected = true;
    const url = code.data;
    document.getElementById('scanMsg').textContent = '✦ QR détecté — redirection...';
    document.getElementById('scanMsg').style.color = '#00dd44';
    arreterCamera();
    // Redirection immédiate
    setTimeout(() => { window.location.href = url; }, 400);
    return;
  }

  animFrame = requestAnimationFrame(scannerFrame);
}
</script>
