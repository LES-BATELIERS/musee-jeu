<link rel="stylesheet" href="css/style.css?v=2">
<style>
@keyframes pulseRouge  { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes rougeVert   { 0%{fill:#3a0808;stroke:#7a1a1a;} 50%{fill:#2a1800;stroke:#aa7700;} 100%{fill:#003010;stroke:#00992e;} }
@keyframes dashFlow    { to{stroke-dashoffset:-20;} }
@keyframes fadeIn      { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Animation spéciale trésor */
@keyframes tresorBat   { 0%,100%{transform:scale(1) rotate(-2deg)} 50%{transform:scale(1.15) rotate(2deg)} }
@keyframes tresorGlow  { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes etoilesSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes particule   {
  0%   { transform:translate(0,0) scale(1); opacity:1; }
  100% { transform:translate(var(--dx),var(--dy)) scale(0); opacity:0; }
}

body { background:#080808; margin:0; padding:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; font-family:Georgia,serif; }
.carte-wrap { width:100%; max-width:420px; padding:12px; box-sizing:border-box; animation:fadeIn 0.8s ease; }
.carte-wrap svg { width:100%; height:auto; display:block; border-radius:8px; }

.btn-retour {
  display:block; margin:10px auto 8px;
  width:calc(100% - 24px); max-width:396px;
  background:transparent; border:1px solid #3a3530;
  border-radius:8px; padding:12px;
  color:#8a8070; font-family:'Jost',sans-serif;
  font-size:0.85rem; letter-spacing:0.15em; text-transform:uppercase;
  cursor:pointer; box-sizing:border-box;
}
.btn-retour:hover { border-color:#8a8070; color:#f0ead8; }

.btn-scanner {
  display:block; width:calc(100% - 24px); max-width:396px;
  margin:0 auto 24px; box-sizing:border-box;
  background:transparent; border:1px solid #5a3810;
  border-radius:8px; padding:12px;
  color:#8a6030; font-family:'Jost',sans-serif;
  font-size:0.85rem; letter-spacing:0.15em; text-transform:uppercase;
  cursor:pointer;
}
.btn-scanner:hover { border-color:#c8a842; color:#c8a842; }

#scannerWrap { width:calc(100% - 24px); max-width:396px; margin:0 auto 24px; border-radius:8px; overflow:hidden; display:none; }
#qr-reader  { width:100%; }
#scanMsg    { text-align:center; padding:8px; font-family:Georgia,serif; font-size:11px; color:rgba(200,168,66,0.8); letter-spacing:1px; background:#0a0804; }

/* Overlay trésor */
#tresorOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.92); z-index:1000;
  flex-direction:column; align-items:center; justify-content:center;
  font-family:Georgia,serif;
}
#tresorOverlay.visible { display:flex; animation:fadeIn 0.5s ease; }
.tresor-coffre { font-size:80px; animation:tresorBat 0.7s ease-in-out infinite; margin-bottom:16px; }
.tresor-titre  { font-size:22px; color:#ddaa00; letter-spacing:4px; text-transform:uppercase; margin-bottom:8px; animation:tresorGlow 1.5s ease-in-out infinite; }
.tresor-sous   { font-size:12px; color:#8a6830; letter-spacing:2px; margin-bottom:32px; }
.tresor-btn    { background:transparent; border:1px solid #ddaa00; border-radius:8px; padding:12px 28px; color:#ddaa00; font-family:Georgia,serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; }
.tresor-btn:hover { background:rgba(200,168,66,0.1); }

/* Particules autour du coffre */
.particules { position:relative; display:flex; align-items:center; justify-content:center; }
.part { position:absolute; width:8px; height:8px; border-radius:50%; animation:particule 1.2s ease-out infinite; }

.ripple-dot { position:fixed;border-radius:50%;background:rgba(200,168,66,0.2);transform:scale(0);pointer-events:none;z-index:99999;animation:rippleG 0.6s ease-out forwards; }
@keyframes rippleG { from{transform:scale(0);opacity:0.5} to{transform:scale(6);opacity:0} }
</style>

<script src="data/parcours.js?v=4"></script>
<script>
const NOMS_CLASSIQUE = ['Le Guide','Le Perroquet','Joseph II','H. Salon Rouge','Horloge figée','Le Dromadaire','La Licorne','La Lampe'];
const NOMS_PMR       = ['Le Guide','Le Perroquet','Joseph II','H. Salon Rouge','Horloge figée','Putti Astronome','Vieux Gardien','La Lampe'];
const PTS = [
  {x:90,y:95},{x:255,y:135},{x:80,y:195},{x:265,y:255},
  {x:90,y:315},{x:255,y:383},{x:100,y:453},{x:225,y:513},{x:180,y:578}
];
const mode = new URLSearchParams(window.location.search).get('mode');

function getNoms() {
  if (typeof GAME === 'undefined') return NOMS_CLASSIQUE;
  return GAME.getSession().parcours === 'pmr' ? NOMS_PMR : NOMS_CLASSIQUE;
}

function getValidated() {
  if (typeof GAME === 'undefined' || typeof PARCOURS === 'undefined') return 0;
  const s = GAME.getSession();
  if (!s.parcours) return 0;
  const indiceAffiche = localStorage.getItem('indiceAffiche') === '1';
  const totalCommun = PARCOURS.commun ? PARCOURS.commun.length : 5;
  // En phase commun : idx = etape courante
  // En phase classique/pmr : idx = toutes les étapes communes + étape dans la branche
  let idx;
  if (s.phase === 'commun') {
    idx = s.etape;
  } else {
    // +1 car on a aussi validé l'étape de bifurcation (horloge-1759) qui est la dernière du commun
    idx = totalCommun + s.etape;
  }
  return indiceAffiche ? idx + 1 : idx;
}

function initParcours() {
  if (typeof GAME === 'undefined') return;
  const s = GAME.getSession();
  const isPMR = s.parcours === 'pmr';
  const label = isPMR ? 'parcours PMR' : (s.parcours === 'enfants' ? 'parcours Enfants' : 'parcours Famille');
  document.getElementById('sousTitre').textContent = '~ ' + label + ' ~';

  ['deco6-classique','deco7-classique'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = isPMR ? 'none' : 'block';
    el.setAttribute('opacity', isPMR ? '0' : '0.45');
  });
  ['deco6-pmr','deco7-pmr'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = isPMR ? 'block' : 'none';
    el.setAttribute('opacity', isPMR ? '0.45' : '0');
  });
}

function renderAll() {
  const NOMS = getNoms();
  const v = getValidated();
  for (let i = 0; i < NOMS.length; i++) updateEtape(i, NOMS, v);
  updateChemin(v);
  updateCoffre(v, NOMS.length);
}

function updateEtape(i, NOMS, v) {
  const c  = document.getElementById('c'+i);
  const tn = document.getElementById('t'+i+'n');
  const tl = document.getElementById('t'+i+'l');
  if (!c) return;
  if (i < v) {
    c.setAttribute('fill','#003010'); c.setAttribute('stroke','#00992e'); c.style.animation='';
    tn.setAttribute('fill','#00dd44'); tl.setAttribute('fill','#00aa33');
    tl.textContent = NOMS[i];
  } else if (i === v) {
    c.setAttribute('fill','#3a0808'); c.setAttribute('stroke','#8a2020');
    c.style.animation = 'pulseRouge 2s ease-in-out infinite';
    tn.setAttribute('fill','#dd4444'); tl.setAttribute('fill','#aa3030');
    tl.textContent = NOMS[i];
  } else {
    c.setAttribute('fill','#1c1408'); c.setAttribute('stroke','#3a2808'); c.style.animation='';
    tn.setAttribute('fill','#3a2808'); tl.setAttribute('fill','#3a2808');
    tl.textContent = '???';
  }
}

function updateChemin(v) {
  document.querySelectorAll('.seg').forEach(e => e.remove());
  const svg  = document.getElementById('carte');
  const base = document.getElementById('chemin-base');
  for (let i = 0; i < v && i < PTS.length - 1; i++) {
    const a = PTS[i], b = PTS[i+1];
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    const seg = document.createElementNS('http://www.w3.org/2000/svg','path');
    seg.setAttribute('d', `M${a.x},${a.y} Q${mx+8},${my-8} ${b.x},${b.y}`);
    seg.setAttribute('fill','none');
    seg.setAttribute('stroke','#00992e');
    seg.setAttribute('stroke-width','2');
    seg.setAttribute('stroke-dasharray','6 4');
    seg.setAttribute('class','seg');
    seg.style.animation = 'dashFlow 0.8s linear infinite';
    svg.insertBefore(seg, base);
  }
}

function updateCoffre(v, total) {
  const g = document.getElementById('coffre');
  if (v >= total) {
    g.style.animation = 'tresorBat 0.7s ease-in-out infinite';
    g.querySelectorAll('rect').forEach(r => r.setAttribute('stroke','#ddaa00'));
    g.querySelector('circle:last-of-type').setAttribute('fill','#ffcc44');
    g.querySelector('text').setAttribute('fill','#ddaa00');
  } else {
    g.style.animation = '';
  }
}

function lancerAnimationTresor() {
  // Créer particules
  const cont = document.getElementById('particules');
  const couleurs = ['#ddaa00','#ffcc44','#ff8800','#ffffff','#ffdd88'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'part';
    const angle = (i / 20) * 360;
    const dist  = 80 + Math.random() * 60;
    const dx = Math.cos(angle * Math.PI/180) * dist;
    const dy = Math.sin(angle * Math.PI/180) * dist;
    p.style.cssText = `
      background:${couleurs[i%couleurs.length]};
      --dx:${dx}px; --dy:${dy}px;
      animation-delay:${Math.random()*0.4}s;
      animation-duration:${0.8+Math.random()*0.6}s;
      animation-iteration-count:infinite;
    `;
    cont.appendChild(p);
  }
  document.getElementById('tresorOverlay').classList.add('visible');
}

function lancerJingle() {
  try {
    var jingle = new Audio('audio/JINGLE PARCOURS INTERRACTIF VSG.mp3');
    jingle.currentTime = 3;
    jingle.volume = 0.85;
    jingle.play().catch(function() {});
    // Arrêter après 8 secondes
    setTimeout(function() {
      jingle.pause();
      jingle.currentTime = 0;
    }, 8000);
  } catch(e) {}
}

function animerReussite() {
  const NOMS = getNoms();
  const v = getValidated();
  if (v === 0) return;
  const c = document.getElementById('c'+(v-1));
  if (!c) return;

  // Lancer le jingle à 3 secondes
  lancerJingle();

  c.style.animation = 'rougeVert 1.5s ease forwards';
  setTimeout(() => {
    renderAll();
    majBoutonBas();
    // Si toutes les étapes sont validées → animation trésor
    if (v >= NOMS.length) {
      setTimeout(lancerAnimationTresor, 800);
    }
  }, 1700);
}

function retourJeu() {
  // Retour vers enigme.html sans paramètre
  // → charge l'étape courante sans déclencher validerEtape()
  // → si indiceAffiche=true, enigme.html redirige ici (progression.html)
  //   donc on va directement à index.html pour éviter une boucle
  const indiceAffiche = localStorage.getItem('indiceAffiche') === '1';
  if (indiceAffiche) {
    // L'indice est affiché → le joueur doit chercher le QR dans le musée
    // On reste sur cette page, on ferme juste le scanner si ouvert
    if (typeof fermerScanner === 'function') fermerScanner();
  } else {
    // Pas d'indice en cours → retour à l'énigme courante
    window.location.href = 'enigme.html';
  }
}

function actionBoutonBas() {
  const NOMS = getNoms();
  const v = getValidated();
  if (v >= NOMS.length) {
    // Parcours terminé → certificat
    window.location.href = 'victoire.html';
  } else {
    // En cours → scanner QR
    toggleScanner();
  }
}

function majBoutonBas() {
  const NOMS = getNoms();
  const v = getValidated();
  const btn = document.getElementById('btnScanner');
  const btnRetour = document.getElementById('btnRetourJeu');
  if (!btn) return;
  if (v >= NOMS.length) {
    btn.textContent = '✦ Récupérer mon certificat';
    btn.style.borderColor = '#ddaa00';
    btn.style.color = '#ddaa00';
    // Parcours terminé → pas besoin du bouton retour
    if (btnRetour) btnRetour.style.display = 'none';
  } else {
    btn.textContent = '✦ Scanner le prochain QR code';
    btn.style.borderColor = '#5a3810';
    btn.style.color = '#8a6030';
    // En cours → changer le texte du bouton retour
    if (btnRetour) {
      btnRetour.textContent = '✦ Je cherche le QR dans le musée';
      btnRetour.style.color = '#6b6355';
    }
  }
}

window.onload = function() {
  initParcours();
  renderAll();
  majBoutonBas();
  if (mode === 'reussi') {
    animerReussite();
  }
  // Si déjà toutes les étapes validées sans animation
  const NOMS = getNoms();
  if (mode !== 'reussi' && getValidated() >= NOMS.length) {
    setTimeout(lancerAnimationTresor, 500);
  }
};
</script>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
let html5QrCode = null;
let scannerOuvert = false;
let detected = false;

function toggleScanner() {
  if (!scannerOuvert) ouvrirScanner();
  else fermerScanner();
}

function ouvrirScanner() {
  detected = false;
  scannerOuvert = true;
  document.getElementById('scannerWrap').style.display = 'block';
  document.getElementById('btnScanner').textContent = '✕ Fermer le scanner';
  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
    (decodedText) => {
      if (detected) return;
      detected = true;
      document.getElementById('scanMsg').textContent = '✦ QR détecté — redirection...';
      document.getElementById('scanMsg').style.color = '#00dd44';
      html5QrCode.stop().then(() => {
        setTimeout(() => { window.location.href = decodedText; }, 400);
      }).catch(() => {
        setTimeout(() => { window.location.href = decodedText; }, 400);
      });
    },
    () => {}
  ).catch(err => {
    document.getElementById('scanMsg').textContent = 'Accès caméra refusé';
    document.getElementById('scanMsg').style.color = '#cc4444';
  });
}

function fermerScanner() {
  scannerOuvert = false;
  document.getElementById('scannerWrap').style.display = 'none';
  document.getElementById('btnScanner').textContent = '✦ Scanner le prochain QR code';
  if (html5QrCode) { html5QrCode.stop().catch(() => {}); html5QrCode = null; }
}
</script>

});
</script>
