<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Bateliers — Félicitations</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>
  <div class="victoire-card">
    <img src="img/logo.png" alt="Les Bateliers" class="logo-musee">
    <div class="separateur"></div>
    <h1>Félicitations</h1>
    <p>Tu as terminé le parcours du musée.</p>
    <div style="margin-top:1rem;">
      <button class="btn-suite" onclick="rejouer()">Recommencer</button>
    </div>
  </div>
  <script src="js/game.js"></script>
  <script src="data/parcours.js"></script>
  <script>
    function rejouer() {
      GAME.reset();
      window.location.href = 'index.html';
    }
  </script>

<style id="ripple-global">
.ripple-dot {
  position: fixed;
  border-radius: 50%;
  background: rgba(240, 234, 216, 0.25);
  transform: scale(0);
  pointer-events: none;
  z-index: 99999;
  animation: rippleGlobal 0.6s ease-out forwards;
}
@keyframes rippleGlobal {
  from { transform: scale(0); opacity: 0.5; }
  to   { transform: scale(6); opacity: 0; }
}
</style>
<script>
document.addEventListener('click', function(e) {
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (e.clientX - size / 2) + 'px';
  dot.style.top    = (e.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
});
document.addEventListener('touchstart', function(e) {
  const touch = e.touches[0];
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (touch.clientX - size / 2) + 'px';
  dot.style.top    = (touch.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
}, { passive: true });
</script>
</body>
</html>
