<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Bateliers — Nuit blanche</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>

<style id="animations-globales">
@keyframes textReveal {
  from { opacity:0; letter-spacing:0.5em; }
  to   { opacity:1; letter-spacing:0.05em; }
}
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
/* Les éléments restent cachés jusqu'à ce que .pret soit ajouté au body */
.anim-logo    { opacity:0; }
.anim-sep     { opacity:0; }
.anim-titre   { opacity:0; }
.anim-sous    { opacity:0; }
.anim-btn1    { opacity:0; }
.anim-btn2    { opacity:0; }
.anim-btn3    { opacity:0; }
body.pret .anim-logo  { animation: fadeInUp  0.6s ease 0.0s both; }
body.pret .anim-sep   { animation: fadeInUp  0.5s ease 0.3s both; }
body.pret .anim-titre { animation: textReveal 0.9s ease 0.4s both; }
body.pret .anim-sous  { animation: fadeInUp  0.5s ease 0.7s both; }
body.pret .anim-btn1  { animation: fadeInUp  0.5s ease 0.9s both; }
body.pret .anim-btn2  { animation: fadeInUp  0.5s ease 1.05s both; }
body.pret .anim-btn3  { animation: fadeInUp  0.5s ease 1.2s both; }
</style>
<style id="vignette-respiration">
@keyframes vigRespire {
  0%,100% { opacity:0.15; }
  50%      { opacity:1; }
}
.vignette-respiration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  background: radial-gradient(ellipse at center,
    rgba(240,234,216,0.13) 15%,
    transparent 45%,
    rgba(0,0,0,0.97) 100%);
  animation: vigRespire 3.5s ease-in-out infinite;
  border-radius: 0;
}
</style>
<div class="vignette-respiration"></div>

  <!-- ÉCRAN DE CHARGEMENT -->
  <div id="ecranChargement" style="
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:#0e0e0e;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:1.5rem; z-index:9999;
    transition: opacity 0.8s ease;">
    <img src="img/logo.png" alt="Les Bateliers" style="width:200px; opacity:0.9;">
    <div style="width:40px; height:1px; background:#3a3530;"></div>
    <div style="display:flex; gap:8px; align-items:center;">
      <div style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out infinite;"></div>
      <div style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out 0.4s infinite;"></div>
      <div style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out 0.8s infinite;"></div>
    </div>
    <div style="font-family:'Jost',sans-serif; font-size:0.7rem; color:#4a4540; letter-spacing:0.25em; text-transform:uppercase;">Chargement</div>
  </div>

  <style>
  @keyframes pulse {
    0%, 100% { opacity:0.2; transform:scale(0.8); }
    50%       { opacity:1;   transform:scale(1.2); }
  }
  </style>

  <div class="accueil">

    <img src="img/logo.png" alt="Les Bateliers" class="logo-musee anim-logo">

    <div class="separateur anim-sep"></div>

    <h1 class="anim-titre">Nuit blanche</h1>
    <p class="sous-titre anim-sous">Choisissez votre parcours</p>

    <!-- Bandeau reprise de partie -->
    <div id="bandeauReprise" style="display:none;flex-direction:column;align-items:center;gap:8px;
         background:rgba(138,128,112,0.12);border:1px solid #3a3530;border-radius:10px;
         padding:14px 18px;margin-bottom:18px;width:100%;box-sizing:border-box;">
      <div style="font-size:0.75rem;color:#8a8070;letter-spacing:2px;text-transform:uppercase;">Partie en cours</div>
      <div id="repriseLabel" style="font-size:1rem;color:#f0ead8;letter-spacing:1px;"></div>
      <div style="display:flex;gap:10px;width:100%;margin-top:4px;">
        <button onclick="reprendrepartie()" style="flex:1;background:transparent;border:1px solid #8a8070;
          border-radius:8px;padding:10px;color:#f0ead8;font-size:0.8rem;letter-spacing:1px;
          text-transform:uppercase;cursor:pointer;">↩ Reprendre</button>
        <button onclick="confirmerNouvelle()" style="flex:1;background:transparent;border:1px solid #3a3530;
          border-radius:8px;padding:10px;color:#6b6355;font-size:0.8rem;letter-spacing:1px;
          text-transform:uppercase;cursor:pointer;">✕ Recommencer</button>
      </div>
    </div>

    <div class="parcours-choix">

      <button class="btn-parcours anim-btn1" onclick="choisirParcours('enfants')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="9" r="5" stroke="#8a8070" stroke-width="1.1"/>
          <path d="M9 8.5 Q10 7.5 11 8.5" stroke="#8a8070" stroke-width="1" stroke-linecap="round"/>
          <path d="M13 8.5 Q14 7.5 15 8.5" stroke="#8a8070" stroke-width="1" stroke-linecap="round"/>
          <path d="M10 11 Q12 12.5 14 11" stroke="#8a8070" stroke-width="1" stroke-linecap="round"/>
          <path d="M6 22 C6 17 18 17 18 22" stroke="#8a8070" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        <div>
          <strong>Enfants</strong>
          <small>Moins de 10 ans</small>
        </div>
      </button>

      <button class="btn-parcours anim-btn2" onclick="choisirParcours('famille')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="9" cy="7" r="3" stroke="#8a8070" stroke-width="1.1"/>
          <circle cx="16" cy="7" r="3" stroke="#8a8070" stroke-width="1.1"/>
          <path d="M4 22 C4 17 14 17 14 22" stroke="#8a8070" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M12 22 C12 17 22 17 22 22" stroke="#8a8070" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        <div>
          <strong>Famille</strong>
          <small>Niveau intermédiaire</small>
        </div>
      </button>

      <button class="btn-parcours pmr anim-btn3" onclick="choisirParcours('pmr')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="14" cy="3.5" r="2" stroke="#8a8070" stroke-width="1.1"/>
          <line x1="14" y1="5.5" x2="14" y2="11" stroke="#8a8070" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M9 11 L14 11 L16 16" stroke="#8a8070" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="9" y1="7" x2="9" y2="15" stroke="#8a8070" stroke-width="1.1" stroke-linecap="round"/>
          <line x1="9" y1="15" x2="14" y2="15" stroke="#8a8070" stroke-width="1" stroke-linecap="round"/>
          <circle cx="10" cy="20" r="3.5" stroke="#8a8070" stroke-width="1.1"/>
          <circle cx="17" cy="19" r="1.8" stroke="#8a8070" stroke-width="1"/>
        </svg>
        <div>
          <strong>PMR</strong>
          <small>Parcours accessible</small>
        </div>
      </button>

    </div>
  </div>

  <script src="js/game.js?v=4"></script>
  <script src="data/parcours.js?v=4"></script>
  <script>
    // window.onload fusionné ci-dessous

    function reprendrepartie() {
      // Reprendre la session en cours → aller directement à l'étape courante
      window.location.href = 'enigme.html';
    }

    function confirmerNouvelle() {
      // Masquer bandeau et laisser l'utilisateur choisir son parcours
      document.getElementById('bandeauReprise').style.display = 'none';
    }

    function choisirParcours(mode) {
      setTimeout(function() {
        // Si une session existe déjà pour ce parcours → on la reprend sans remettre à zéro
        const parcoursExistant = localStorage.getItem('parcours');
        const etapeExistante   = parseInt(localStorage.getItem('etape') || '0');
        const phaseExistante   = localStorage.getItem('phase') || 'commun';
        const dejaParcours     = parcoursExistant === mode && etapeExistante > 0;

        if (!dejaParcours) {
          // Nouvelle partie : réinitialiser
          localStorage.setItem('parcours', mode);
          localStorage.setItem('etape',    '0');
          localStorage.setItem('erreurs',  '0');
          localStorage.setItem('phase',    'commun');
          localStorage.setItem('indiceAffiche', '0');
        }
        // Dans tous les cas, aller vers l'étape courante
        window.location.href = 'enigme.html';
      }, 300);
    }

    function nouvellePartie(mode) {
      // Forcer une nouvelle partie même si session existante
      setTimeout(function() {
        localStorage.setItem('parcours', mode);
        localStorage.setItem('etape',    '0');
        localStorage.setItem('erreurs',  '0');
        localStorage.setItem('phase',    'commun');
        localStorage.setItem('indiceAffiche', '0');
        window.location.href = 'enigme.html';
      }, 300);
    }

    // Au chargement : écran de chargement + détecter session en cours
    window.onload = function() {
      // Écran de chargement
      setTimeout(function() {
        const ec = document.getElementById('ecranChargement');
        if (ec) {
          ec.style.opacity = '0';
          setTimeout(function() { if (ec) ec.style.display = 'none'; }, 800);
        }
        document.body.classList.add('pret');
      }, 1000);

      // Détecter session en cours
      const parcours = localStorage.getItem('parcours');
      const etape    = parseInt(localStorage.getItem('etape') || '0');
      const indice   = localStorage.getItem('indiceAffiche') === '1';
      const aSession = parcours && (etape > 0 || indice);

      if (aSession) {
        const noms = { enfants: 'Enfants', famille: 'Famille', pmr: 'PMR' };
        const nomParcours = noms[parcours] || parcours;
        const bandeau = document.getElementById('bandeauReprise');
        const lbl     = document.getElementById('repriseLabel');
        if (bandeau && lbl) {
          lbl.textContent = 'Parcours ' + nomParcours + ' en cours';
          bandeau.style.display = 'flex';
        }
      }
    };
  </script>


<style id="ripple-global">
.ripple-dot {
  position: fixed;
  border-radius: 50%;
  background: rgba(240, 234, 216, 0.25);
  transform: scale(0);
  pointer-events: none;
  z-index: 99999;
  animation: rippleGlobal 0.6s ease-out forwards;
}
@keyframes rippleGlobal {
  from { transform: scale(0); opacity: 0.5; }
  to   { transform: scale(6); opacity: 0; }
}
</style>
<script>
document.addEventListener('click', function(e) {
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (e.clientX - size / 2) + 'px';
  dot.style.top    = (e.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
});
document.addEventListener('touchstart', function(e) {
  const touch = e.touches[0];
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (touch.clientX - size / 2) + 'px';
  dot.style.top    = (touch.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
}, { passive: true });
</script>
</body>
</html>
