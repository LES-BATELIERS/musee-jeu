<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Bateliers — Jeu du Musée</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>

  <div class="accueil">

    <img src="img/logo.png" alt="Les Bateliers" class="logo-musee">

    <div class="separateur"></div>

    <h1>Le Jeu du Musée</h1>
    <p class="sous-titre">Choisissez votre parcours</p>

    <div class="parcours-choix">

      <button class="btn-parcours" onclick="choisirParcours('enfants')">
        <div class="btn-point"></div>
        <div>
          <strong>Enfants</strong>
          <small>Moins de 10 ans</small>
        </div>
      </button>

      <button class="btn-parcours" onclick="choisirParcours('famille')">
        <div class="btn-point"></div>
        <div>
          <strong>Famille</strong>
          <small>Niveau intermédiaire</small>
        </div>
      </button>

      <button class="btn-parcours pmr" onclick="choisirParcours('pmr')">
        <div class="btn-point"></div>
        <div>
          <strong>PMR</strong>
          <small>Parcours accessible</small>
        </div>
      </button>

    </div>
  </div>

  <script src="js/game.js?v=1"></script>
  <script src="data/parcours.js?v=1"></script>
  <script>
    function choisirParcours(mode) {
      localStorage.setItem('parcours', mode);
      localStorage.setItem('etape',    '0');
      localStorage.setItem('erreurs',  '0');
      localStorage.setItem('phase',    'commun');
      window.location.href = 'enigme.html?etape=0';
    }
  </script>

</body>
</html>
