<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Bateliers — Jeu du Musée</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>

<style id="animations-globales">
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes cardAppear {
  from { opacity:0; transform:perspective(800px) rotateX(25deg) translateY(30px); }
  to   { opacity:1; transform:perspective(800px) rotateX(0deg)  translateY(0); }
}
.card-animate {
  animation: cardAppear 1.3s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes textReveal {
  from { opacity:0; letter-spacing:0.5em; }
  to   { opacity:1; letter-spacing:0.05em; }
}

</style>
<style id="vignette-respiration">
@keyframes vigRespire {
  0%,100% { opacity:0.15; }
  50%      { opacity:1; }
}
.vignette-respiration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  background: radial-gradient(ellipse at center,
    rgba(240,234,216,0.13) 15%,
    transparent 45%,
    rgba(0,0,0,0.97) 100%);
  animation: vigRespire 3.5s ease-in-out infinite;
  border-radius: 0;
}
</style>
<div class="vignette-respiration"></div>

<!-- ÉCRAN DE CHARGEMENT -->
<div id="ecranChargement" style="
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#0e0e0e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:1.5rem; z-index:9999;
  transition: opacity 0.8s ease;">
  <img src="img/logo.png" alt="Les Bateliers" style="width:200px; opacity:0.9;">
  <div style="width:40px; height:1px; background:#3a3530;"></div>
  <div style="display:flex; gap:8px; align-items:center;">
    <div class="point-charge" style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out infinite;"></div>
    <div class="point-charge" style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out 0.4s infinite;"></div>
    <div class="point-charge" style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out 0.8s infinite;"></div>
  </div>
  <div style="font-family:'Jost',sans-serif; font-size:0.7rem; color:#4a4540; letter-spacing:0.25em; text-transform:uppercase;">Chargement</div>
</div>

<style>
@keyframes pulse {
  0%, 100% { opacity:0.2; transform:scale(0.8); }
  50%       { opacity:1;   transform:scale(1.2); }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-8px); }
  40%     { transform:translateX(8px); }
  60%     { transform:translateX(-5px); }
  80%     { transform:translateX(5px); }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes flashErreur {
  0%,100% { border-color:#1e1c18; }
  40%     { border-color:#c89090; box-shadow:0 0 0 2px rgba(200,144,144,0.15); }
}
@keyframes flashOk {
  0%,100% { border-color:#1e1c18; }
  40%     { border-color:#a8c8a0; box-shadow:0 0 0 2px rgba(168,200,160,0.15); }
}
.anim-shake    { animation: shake 0.45s ease, flashErreur 0.8s ease; }
.anim-slide-up { animation: slideUp 0.35s ease, flashOk 0.8s ease; }
</style>

<div class="jeu-container">

  <!-- HEADER : logo + progression -->
  <div class="jeu-header">
      <div class="progression-bar" style="width:100%">
      <div class="progression-fill" id="progressionFill"></div>
    </div>
    <div class="progression-label" id="progressionLabel">Progression : 0%</div>
  </div>

  <!-- ÉCRAN : SPLASH (intro avant vidéo avec musique) -->
  <div class="ecran cache" id="ecranSplash">
    <div class="indice-card" style="min-height:340px; justify-content:center;">
      <img src="img/logo.png" alt="Les Bateliers" class="logo-question">
      <div class="separateur-question"></div>
      <div class="personnage-nom" id="splashPersonnage"></div>
      <p style="color:#8a8070; font-size:0.9rem; line-height:1.8;" id="splashMessage"></p>
      <button class="btn-suite" id="btnSplash" onclick="lancerDepuisSplash()">
        Découvrir ▶
      </button>
    </div>
  </div>

  <!-- ÉCRAN : VIDÉO -->
  <div class="ecran cache" id="ecranVideo">
    <div class="video-wrapper">
      <iframe id="videoPlayer"
        src=""
        frameborder="0"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
    <button class="btn-suite" id="btnSuiteVideo" onclick="demarrerMusiqueEtLancerQuestion()">
      Voir la question ▶
    </button>
  </div>

  <!-- ÉCRAN : QUESTION -->
  <div class="ecran cache" id="ecranQuestion">
    <div class="question-card">
      <img src="img/logo.png" alt="Les Bateliers" class="logo-question">
      <div class="separateur-question"></div>
      <div class="personnage-nom" id="personnageNom"></div>
      <p class="question-texte" id="questionTexte"></p>
      <div class="choix-liste" id="choixListe"></div>
    </div>
  </div>

  <!-- ÉCRAN : FEEDBACK (bonne/mauvaise réponse) -->
  <div class="ecran cache" id="ecranFeedback">
    <div class="video-wrapper">
      <iframe id="videoFeedback"
        src=""
        frameborder="0"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
    <div id="messageFeedback" class="message-feedback"></div>
    <button class="btn-suite cache" id="btnApresReponse" onclick="apresReponse()"></button>
  </div>

  <!-- ÉCRAN : INDICE (trouver le prochain QR) -->
  <div class="ecran cache" id="ecranIndice">
    <div class="indice-card">
      <div class="indice-separateur"></div>
      <h2>Bien joué !</h2>
      <p id="indiceTexte"></p>
    </div>
  </div>

  <!-- ÉCRAN : ERREUR ANTI-CHEAT -->
  <div class="ecran cache" id="ecranCheat">
    <div class="cheat-card">
      <div class="indice-icone">✦</div>
      <h2>Pas si vite !</h2>
      <p>Tu dois d'abord trouver et valider l'étape précédente dans le musée.</p>
      <button class="btn-suite" id="btnCheatRetour" onclick="retourEtapeCourante()">
        Reprendre où j'en suis
      </button>
    </div>
  </div>

</div>

<script src="data/parcours.js?v=1"></script>
<script src="js/game.js?v=1"></script>
<script>

  // ── Variables globales ──
  let etapeData   = null;
  let questionData = null;
  let session     = null;
  let bonneReponse = false;

  // ── Musiques de fond par étape ──
  const MUSIQUES = {
    'intro-guide': {
      fichier: 'audio/(( DÉBUT )) JID x Kendrick Lamar x J. Cole Type Beat  Je Suis Perdu.mp3',
      debut: 10
    },
    'perroquet': {
      fichier: "audio/(( PERROQUET )) Sea Of Thieves Music - Season 17 Title Screen Theme - [Smugglers' Tide].mp3",
      debut: 9
    }
  };

  let musique = null; // musique active

  // ── Initialisation au chargement ──
  window.onload = function() {

    session = GAME.getSession();

    // Vider les mauvais choix mémorisés au chargement d'une nouvelle page
    localStorage.removeItem('dejaTentes');

    // Masquer l'écran de chargement avec fondu
    setTimeout(function() {
      const ec = document.getElementById('ecranChargement');
      ec.style.opacity = '0';
      setTimeout(function() { ec.style.display = 'none'; }, 800);
    }, 1200);

    // Pas de parcours choisi → retour accueil
    if (!session.parcours) {
      window.location.href = 'index.html';
      return;
    }

    // Récupérer l'ID de l'étape depuis l'URL (?etape=intro-guide)
    const params  = new URLSearchParams(window.location.search);
    const idEtape = params.get('etape');

    // Anti-cheat : seulement si un ID est fourni ET différent de "0"
    if (idEtape && idEtape !== '0' && !GAME.peutAcceder(idEtape)) {
      afficherEcran('ecranCheat');
      return;
    }

    // Charger l'étape
    etapeData = GAME.getEtapeCourante();
    if (!etapeData) {
      window.location.href = 'victoire.html';
      return;
    }

    questionData = GAME.getQuestion(etapeData, session);

    // Mettre à jour la progression
    const pct = GAME.getProgression();
    document.getElementById('progressionFill').style.width = pct + '%';
    document.getElementById('progressionLabel').textContent = 'Progression : ' + pct + '%';

    // Charger la vidéo d'intro
    if (etapeData.videoIntro) {
      const configMusique = MUSIQUES[etapeData.id];
      // Splash uniquement pour les étapes après le guide (pas l'intro)
      if (configMusique && etapeData.id !== 'intro-guide') {
        document.getElementById('splashPersonnage').textContent = etapeData.personnage;
        document.getElementById('splashMessage').textContent = "Prépare-toi... une nouvelle rencontre t'attend.";
        afficherEcran('ecranSplash');
      } else {
        chargerVideo('videoPlayer', etapeData.videoIntro);
        afficherEcran('ecranVideo');
        demarrerMusique(etapeData.id);
      }
    } else {
      // Pas de vidéo → aller direct à la question
      afficherQuestion();
    }
  };

  // ── Afficher la question ──
  function afficherQuestion() {
    session = GAME.getSession();



    document.getElementById('personnageNom').textContent = etapeData.personnage;
    document.getElementById('questionTexte').textContent = questionData.texte;

    // Compteur d'erreurs
    majCompteurErreurs();

    // Générer les boutons de réponse
    const liste = document.getElementById('choixListe');
    liste.innerHTML = '';
    const erreursActuelles = GAME.getSession().erreurs;
    const dejaTentes = JSON.parse(localStorage.getItem('dejaTentes') || '[]');
    questionData.choix.forEach(function(choix, index) {
      const btn = document.createElement('button');
      btn.className = 'btn-choix';
      btn.textContent = choix;
      // Griser les choix déjà tentés (mauvaises réponses précédentes)
      if (dejaTentes.includes(index)) {
        btn.disabled = true;
        btn.style.opacity = '0.3';
        btn.style.textDecoration = 'line-through';
      } else {
        btn.onclick = function() { verifierReponse(index); };
      }
      liste.appendChild(btn);
    });

    afficherEcran('ecranQuestion');
  }

  // ── Vérifier la réponse ──
  function verifierReponse(indexChoisi) {

    // Désactiver tous les boutons (évite double-clic)
    document.querySelectorAll('.btn-choix').forEach(function(b) {
      b.disabled = true;
    });

    // Colorer le bouton cliqué
    const btnsClic = document.querySelectorAll('.btn-choix');
    if (indexChoisi === questionData.bonne) {
      btnsClic[indexChoisi].style.borderColor = '#a8c8a0';
      btnsClic[indexChoisi].style.color = '#a8c8a0';
    } else {
      btnsClic[indexChoisi].style.borderColor = '#c89090';
      btnsClic[indexChoisi].style.color = '#c89090';
      btnsClic[indexChoisi].classList.add('anim-shake');
    }

    if (indexChoisi === questionData.bonne) {
      // ✅ BONNE RÉPONSE
      bonneReponse = true;

      if (etapeData.videoBonneReponse) {
        chargerVideo('videoFeedback', etapeData.videoBonneReponse);
        document.getElementById('messageFeedback').innerHTML =
          '<span class="feedback-ok">✅ Bravo ! Bonne réponse !</span>';
        document.getElementById('btnApresReponse').textContent = 'Continuer ▶';
        document.getElementById('btnApresReponse').classList.remove('cache');
        afficherEcran('ecranFeedback');
        // Animation bonne réponse
        const feedback = document.getElementById('messageFeedback');
        feedback.classList.remove('anim-shake', 'anim-slide-up');
        void feedback.offsetWidth;
        feedback.classList.add('anim-slide-up');
      } else {
        // Pas de vidéo de feedback → aller direct à l'indice
        afficherIndice();
      }

    } else {
      // ❌ MAUVAISE RÉPONSE
      bonneReponse = false;
      const nbErreurs = GAME.ajouterErreur();
      session = GAME.getSession();
      // Mémoriser ce mauvais choix pour le barrer au retour
      const dejaTentes = JSON.parse(localStorage.getItem('dejaTentes') || '[]');
      if (!dejaTentes.includes(indexChoisi)) dejaTentes.push(indexChoisi);
      localStorage.setItem('dejaTentes', JSON.stringify(dejaTentes));

      const indexVideo = Math.min(nbErreurs - 1, etapeData.videsMauvaisesReponses.length - 1);
      const videoErreur = etapeData.videsMauvaisesReponses[indexVideo];

      if (videoErreur) {
        chargerVideo('videoFeedback', videoErreur);
      }

      if (nbErreurs >= 2) {
        // 2 erreurs atteintes → on indique que c'est la dernière chance
        // mais le joueur DOIT quand même cliquer la bonne réponse lui-même
        document.getElementById('messageFeedback').innerHTML =
          '<span class="feedback-erreur">❌ Encore raté ! Regarde bien et trouve la bonne réponse...</span>';
        document.getElementById('btnApresReponse').textContent = 'Réessayer ▶';
        bonneReponse = false; // Le joueur doit encore trouver la bonne réponse
      } else {
        document.getElementById('messageFeedback').innerHTML =
          '<span class="feedback-erreur">❌ Pas tout à fait... Encore un essai !</span>';
        document.getElementById('btnApresReponse').textContent = 'Réessayer ▶';
      }

      document.getElementById('btnApresReponse').classList.remove('cache');
      afficherEcran('ecranFeedback');
      // Animation mauvaise réponse
      const card = document.querySelector('#ecranFeedback .video-wrapper, #ecranFeedback');
      const feedback = document.getElementById('messageFeedback');
      feedback.classList.remove('anim-shake', 'anim-slide-up');
      void feedback.offsetWidth; // reset animation
      feedback.classList.add('anim-shake');
    }
  }

  // ── Après la vidéo de feedback ──
  function apresReponse() {
    if (bonneReponse) {
      afficherIndice();
    } else {
      afficherQuestion();
      lancerCascade();
    }
  }

  // ── Afficher l'indice (prochain QR à trouver) ──
  function afficherIndice() {
    GAME.avancer();
    session = GAME.getSession();
    localStorage.removeItem('dejaTentes'); // Réinitialiser pour la prochaine étape

    // Mettre à jour la barre de progression
    const pct = GAME.getProgression();
    document.getElementById('progressionFill').style.width = pct + '%';
    document.getElementById('progressionLabel').textContent = 'Progression : ' + pct + '%';

    let indice = etapeData.indice;
    // Cas bifurcation
    if (typeof indice === 'object') {
      indice = session.parcours === 'pmr' ? indice.pmr : indice.classique;
    }

    document.getElementById('indiceTexte').textContent = indice || "Bravo, tu as terminé !";

    // Arrêter la musique — étape réussie, joueur repart dans le musée
    if (musique) {
      musique.pause();
      musique.currentTime = 0;
    }

    // Vérifier si c'est la fin
    const prochaineEtape = GAME.getEtapeCourante();
    if (!prochaineEtape) {
      setTimeout(function() {
        window.location.href = 'victoire.html';
      }, 3000);
    }

    afficherEcran('ecranIndice');
  }

  // ── Démarrer la musique selon l'étape ──
  // ── Lancer depuis le splash (musique + vidéo au même tap) ──
  function lancerDepuisSplash() {
    demarrerMusique(etapeData.id);
    chargerVideo('videoPlayer', etapeData.videoIntro);
    afficherEcran('ecranVideo');
  }

  function demarrerMusiqueEtLancerQuestion() {
    afficherQuestion();
    lancerCascade();
  }

  function lancerCascade() {
    var carte = document.getElementById('ecranQuestion').querySelector('.question-card');
    carte.classList.remove('card-animate');
    void carte.offsetWidth; // reset
    carte.classList.add('card-animate');
  }

  function demarrerMusique(idEtape) {
    const config = MUSIQUES[idEtape];
    if (!config) return;
    if (musique) { musique.pause(); musique = null; }
    musique = new Audio(config.fichier);
    musique.loop        = true;
    musique.volume      = 0.18;
    musique.currentTime = config.debut;
    // Tentative immédiate (fonctionne sur PC et certains Android)
    musique.play().catch(function() {
      // Bloqué par le navigateur → on attend le premier tap ou clic
      function debloquer() {
        if (musique) musique.play();
        document.removeEventListener('touchstart', debloquer);
        document.removeEventListener('click', debloquer);
      }
      document.addEventListener('touchstart', debloquer, { once: true });
      document.addEventListener('click', debloquer, { once: true });
    });
  }

  // ── Helpers ──
  function afficherEcran(idEcran) {
    document.querySelectorAll('.ecran').forEach(function(e) {
      e.classList.add('cache');
    });
    document.getElementById(idEcran).classList.remove('cache');
  }

  function chargerVideo(idPlayer, url) {
    // Convertir URL YouTube Shorts en embed
    let embedUrl = url;
    embedUrl = embedUrl.replace('youtube.com/shorts/', 'youtube.com/embed/');
    embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
    // Nettoyer les paramètres après ?
    embedUrl = embedUrl.split('?')[0];
    embedUrl += '?autoplay=1&rel=0&vq=hd1080&playsinline=1';
    document.getElementById(idPlayer).src = embedUrl;
  }

  // ── Retour à l'étape courante (après tentative de triche) ──
  function retourEtapeCourante() {
    const s = GAME.getSession();
    // Si pas de session → accueil
    if (!s.parcours) {
      window.location.href = 'index.html';
      return;
    }
    // Récupérer l'étape actuelle et y retourner
    const etape = GAME.getEtapeCourante();
    if (etape) {
      window.location.href = 'enigme.html?etape=' + etape.id;
    } else {
      window.location.href = 'index.html';
    }
  }

  function majCompteurErreurs() { /* supprimé — plus de compteur coeurs */ }

</script>

<style id="ripple-global">
.ripple-dot {
  position: fixed;
  border-radius: 50%;
  background: rgba(240, 234, 216, 0.25);
  transform: scale(0);
  pointer-events: none;
  z-index: 99999;
  animation: rippleGlobal 0.6s ease-out forwards;
}
@keyframes rippleGlobal {
  from { transform: scale(0); opacity: 0.5; }
  to   { transform: scale(6); opacity: 0; }
}
</style>
<script>
document.addEventListener('click', function(e) {
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (e.clientX - size / 2) + 'px';
  dot.style.top    = (e.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
});
document.addEventListener('touchstart', function(e) {
  const touch = e.touches[0];
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (touch.clientX - size / 2) + 'px';
  dot.style.top    = (touch.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
}, { passive: true });
</script>
</body>
</html>
