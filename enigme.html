<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Bateliers — Jeu du Musée</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>
<div id="flecheScroll" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});cacherFleche();">
  <svg viewBox="0 0 24 24" fill="none"><path d="M12 4v16M5 13l7 7 7-7" stroke="#c8a842" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span>Continuer</span>
</div>


<style id="animations-globales">
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes cardAppear {
  from { opacity:0; transform:perspective(800px) rotateX(25deg) translateY(30px); }
  to   { opacity:1; transform:perspective(800px) rotateX(0deg)  translateY(0); }
}
.card-animate {
  animation: cardAppear 1.3s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes textReveal {
  from { opacity:0; letter-spacing:0.5em; }
  to   { opacity:1; letter-spacing:0.05em; }
}

</style>
<style id="vignette-respiration">
@keyframes vigRespire {
  0%,100% { opacity:0.15; }
  50%      { opacity:1; }
}
.vignette-respiration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  background: radial-gradient(ellipse at center,
    rgba(240,234,216,0.13) 15%,
    transparent 45%,
    rgba(0,0,0,0.97) 100%);
  animation: vigRespire 3.5s ease-in-out infinite;
  border-radius: 0;
}
</style>
<div class="vignette-respiration"></div>

<!-- ÉCRAN DE CHARGEMENT -->
<div id="ecranChargement" style="
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#0e0e0e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:1.5rem; z-index:9999;
  transition: opacity 0.8s ease;">
  <img src="img/logo.png" alt="Les Bateliers" style="width:200px; opacity:0.9;">
  <div style="width:40px; height:1px; background:#3a3530;"></div>
  <div style="display:flex; gap:8px; align-items:center;">
    <div class="point-charge" style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out infinite;"></div>
    <div class="point-charge" style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out 0.4s infinite;"></div>
    <div class="point-charge" style="width:6px;height:6px;border-radius:50%;background:#8a8070;animation:pulse 1.2s ease-in-out 0.8s infinite;"></div>
  </div>
  <div style="font-family:'Jost',sans-serif; font-size:0.7rem; color:#4a4540; letter-spacing:0.25em; text-transform:uppercase;">Chargement</div>
</div>

<style>
@keyframes pulse {
  0%, 100% { opacity:0.2; transform:scale(0.8); }
  50%       { opacity:1;   transform:scale(1.2); }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-8px); }
  40%     { transform:translateX(8px); }
  60%     { transform:translateX(-5px); }
  80%     { transform:translateX(5px); }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes flashErreur {
  0%,100% { border-color:#1e1c18; }
  40%     { border-color:#c89090; box-shadow:0 0 0 2px rgba(200,144,144,0.15); }
}
@keyframes flashOk {
  0%,100% { border-color:#1e1c18; }
  40%     { border-color:#a8c8a0; box-shadow:0 0 0 2px rgba(168,200,160,0.15); }
}
.anim-shake    { animation: shake 0.45s ease, flashErreur 0.8s ease; }
.anim-slide-up { animation: slideUp 0.35s ease, flashOk 0.8s ease; }
</style>

<div class="jeu-container">

  <!-- HEADER : logo + progression -->
  <div class="jeu-header">
      <div class="progression-bar" style="width:100%">
      <div class="progression-fill" id="progressionFill"></div>
    </div>
    <div class="progression-label" id="progressionLabel">Progression : 0%</div>
  </div>

  <!-- ÉCRAN : SPLASH (intro avant vidéo avec musique) -->
  <div class="ecran cache" id="ecranSplash">
    <div class="indice-card" style="min-height:340px; justify-content:center;">
      <img src="img/logo.png" alt="Les Bateliers" class="logo-question">
      <div class="separateur-question"></div>
      <div class="personnage-nom" id="splashPersonnage"></div>
      <p style="color:#8a8070; font-size:0.9rem; line-height:1.8;" id="splashMessage"></p>
      <button class="btn-suite" id="btnSplash" onclick="lancerDepuisSplash()">
        Découvrir ▶
      </button>
    </div>
  </div>

  <!-- ÉCRAN : VIDÉO -->
  <div class="ecran cache" id="ecranVideo">
    <div class="video-wrapper">
      <iframe id="videoPlayer"
        src=""
        frameborder="0"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
    <button class="btn-suite" id="btnSuiteVideo" onclick="demarrerMusiqueEtLancerQuestion()">
      Continuer ▶
    </button>
  </div>

  <!-- ÉCRAN : QUESTION -->
  <div class="ecran cache" id="ecranQuestion">
    <div class="question-card">
      <img src="img/logo.png" alt="Les Bateliers" class="logo-question">
      <div class="separateur-question"></div>
      <div class="personnage-nom" id="personnageNom"></div>
      <p class="question-texte" id="questionTexte"></p>

      <!-- Bouton calculette + panneau dépliable -->
      <div id="calcZone" style="display:none;margin:10px 0 4px;">

        <!-- Bouton toggle -->
        <button id="btnCalc" onclick="toggleCalc()" style="
          display:flex;align-items:center;gap:8px;
          background:transparent;border:1px solid #3a3530;
          border-radius:8px;padding:8px 14px;
          color:#8a8070;font-size:0.75rem;letter-spacing:1px;
          text-transform:uppercase;cursor:pointer;
          width:100%;justify-content:center;margin-bottom:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8070" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="16" height="20" rx="2"/>
            <line x1="8" y1="6" x2="16" y2="6"/>
            <line x1="8" y1="10" x2="10" y2="10"/>
            <line x1="14" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="10" y2="14"/>
            <line x1="14" y1="14" x2="16" y2="14"/>
            <line x1="8" y1="18" x2="10" y2="18"/>
            <line x1="14" y1="18" x2="16" y2="18"/>
          </svg>
          Calculette
        </button>

        <!-- Panneau calculette dépliable -->
        <div id="miniCalc" style="display:none;margin-top:8px;background:rgba(0,0,0,0.4);border:1px solid #3a3530;border-radius:8px;padding:12px;">
          <!-- Historique des calculs -->
          <div id="calcHistorique" style="min-height:20px;margin-bottom:8px;font-size:11px;color:#4a4540;text-align:right;letter-spacing:0.5px;line-height:1.8;"></div>
          <!-- Ligne de calcul -->
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
            <input id="calcA" type="number" inputmode="decimal" placeholder="0"
              style="flex:1;background:#0a0a0a;border:1px solid #2a2520;border-radius:6px;
              padding:8px;color:#f0ead8;font-size:15px;text-align:center;width:0;min-width:0;">
            <select id="calcOp"
              style="background:#0a0a0a;border:1px solid #2a2520;border-radius:6px;
              padding:8px 6px;color:#c8a842;font-size:16px;font-weight:bold;">
              <option value="div">÷</option>
              <option value="mul">×</option>
              <option value="add">+</option>
              <option value="sub">−</option>
            </select>
            <input id="calcB" type="number" inputmode="decimal" placeholder="0"
              style="flex:1;background:#0a0a0a;border:1px solid #2a2520;border-radius:6px;
              padding:8px;color:#f0ead8;font-size:15px;text-align:center;width:0;min-width:0;">
            <button onclick="calculer()"
              style="background:#1a1814;border:1px solid #8a8070;border-radius:6px;
              padding:8px 12px;color:#f0ead8;font-size:15px;font-weight:bold;cursor:pointer;
              flex-shrink:0;">=</button>
          </div>
          <!-- Résultat -->
          <div id="calcResultat"
            style="text-align:center;font-size:20px;color:#c8a842;
            letter-spacing:1px;font-weight:bold;min-height:28px;padding:4px 0;">
          </div>
          <!-- Bouton réutiliser le résultat -->
          <button id="btnReutiliser" onclick="reutiliserResultat()" style="
            display:none;width:100%;margin-top:6px;
            background:transparent;border:1px solid #2a2520;border-radius:6px;
            padding:6px;color:#6b6355;font-size:10px;letter-spacing:1px;
            text-transform:uppercase;cursor:pointer;">
            ↩ Réutiliser ce résultat
          </button>
        </div>
      </div>

      <div class="choix-liste" id="choixListe"></div>
    </div>
  </div>

  <!-- ÉCRAN : FEEDBACK (bonne/mauvaise réponse) -->
  <div class="ecran cache" id="ecranFeedback">
    <div class="video-wrapper">
      <iframe id="videoFeedback"
        src=""
        frameborder="0"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
    <div id="messageFeedback" class="message-feedback"></div>
    <button class="btn-suite cache" id="btnApresReponse" onclick="apresReponse()"></button>
  </div>

  <!-- ÉCRAN : INDICE (trouver le prochain QR) -->
  <div class="ecran cache" id="ecranIndice">
    <div class="indice-card">
      <div class="indice-separateur"></div>
      <h2>Bien joué !</h2>
      <p id="indiceTexte"></p>
    </div>
  </div>

  <!-- ÉCRAN : ERREUR ANTI-CHEAT -->
  <div class="ecran cache" id="ecranCheat">
    <div class="cheat-card">
      <div class="indice-icone">✦</div>
      <h2>Pas si vite !</h2>
      <p id="cheatIndice">Tu dois d'abord trouver l'étape précédente dans le musée.</p>
    </div>
  </div>

</div>

<script src="data/parcours.js?v=4"></script>
<script src="js/game.js?v=4"></script>
<script>

  // ── Variables globales ──
  let etapeData   = null;
  let questionData = null;
  let session     = null;
  let bonneReponse = false;

  // ── Musiques de fond par étape ──
  const MUSIQUES = {
    'intro-guide': {
      fichier: 'audio/(( DÉBUT )) JID x Kendrick Lamar x J. Cole Type Beat  Je Suis Perdu.mp3',
      debut: 10
    },
    'perroquet': {
      fichier: "audio/(( PERROQUET )) Sea Of Thieves Music - Season 17 Title Screen Theme - [Smugglers' Tide].mp3",
      debut: 9
    },
    'joseph-ii': {
      fichier: 'audio/(( JOSEPH II )) Two Steps From Hell - Black Blade (Invincible).mp3',
      debut: 25
    },
    'horloge-salon-rouge': {
      fichier: 'audio/(( HORLOGE )) Musique Stressante n3.mp3',
      debut: 0
    },
    'horloge-1759': {
      fichier: 'audio/(( HORLOGE )) Musique Stressante n3.mp3',
      debut: 0
    },
    'dromadaire': {
      fichier: 'audio/(( DROMADAIRE ))Free Arabic Type Beat  Desert Soul  Trap x Middle East Instrumental 2025.mp3',
      debut: 0
    },
    'licorne-classique': {
      fichier: 'audio/(( LICORNE )) Riding a Black Unicorn (Instrumental).mp3',
      debut: 15
    },
    'putti-astrologue': {
      fichier: 'audio/(( PUTTI )) lexin_music-cinematic-middle-east-118673.mp3',
      debut: 0
    },
    'vieux-gardien': {
      fichier: 'audio/(( GARDIEN ))2022-03-05_-_Raging_Tides_-_www.FesliyanStudios.com.mp3',
      debut: 16
    },
    'lampe-magique': {
      fichier: 'audio/(( LAMPE MAGIQUE )) Breathtaking Cinematic Epic Arabian Music  Royalty Free No Copyright.mp3',
      debut: 0
    }
  };

  let musique = null; // musique active

  // ── Initialisation au chargement ──
  window.onload = function() {

    session = GAME.getSession();

    // Vider les mauvais choix mémorisés au chargement d'une nouvelle page
    localStorage.removeItem('dejaTentes');

    // Masquer l'écran de chargement avec fondu
    setTimeout(function() {
      const ec = document.getElementById('ecranChargement');
      ec.style.opacity = '0';
      setTimeout(function() { ec.style.display = 'none'; }, 800);
    }, 1200);

    // Pas de parcours choisi → retour accueil
    if (!session.parcours) {
      window.location.href = 'index.html';
      return;
    }

    // Récupérer l'ID de l'étape depuis l'URL (?etape=perroquet etc.)
    const params  = new URLSearchParams(window.location.search);
    const idEtape = params.get('etape');

    // Note: on ne sauvegarde plus l'URL enigme dans sessionStorage
    // pour éviter que le bouton "Retour au jeu" de progression.html
    // ne déclenche validerEtape() sans scan de QR

    // Si le joueur arrive avec un QR ET que l'indice était affiché → valider l'étape
    if (session.indiceAffiche && idEtape && idEtape !== '0') {
      GAME.validerEtape();
      session = GAME.getSession();
      // Continuer normalement pour charger la nouvelle énigme
    }
    // Si indice affiché mais PAS de QR → rediriger vers la carte de progression
    // qui affiche l'indice + le scanner QR
    else if (session.indiceAffiche && (!idEtape || idEtape === '0')) {
      window.location.href = 'progression.html';
      return;
    }

    // Anti-cheat : seulement si un ID est fourni ET différent de "0"
    if (idEtape && idEtape !== '0' && !GAME.peutAcceder(idEtape)) {
      // Récupérer l'indice de l'étape PRÉCÉDENTE (celle qui dit où aller)
      const s = GAME.getSession();
      let liste;
      if (s.phase === 'commun')    liste = PARCOURS.commun;
      if (s.phase === 'classique') liste = PARCOURS.classique;
      if (s.phase === 'pmr')       liste = PARCOURS.pmr;

      // L'étape précédente = etape actuelle - 1
      const indexPrec = s.etape - 1;
      const etapePrec = (liste && indexPrec >= 0) ? liste[indexPrec] : null;

      if (etapePrec) {
        let indice = etapePrec.indice;
        if (typeof indice === 'object') {
          indice = s.parcours === 'pmr' ? indice.pmr : indice.classique;
        }
        document.getElementById('cheatIndice').textContent = indice || "Continue à chercher dans le musée !";
      } else {
        document.getElementById('cheatIndice').textContent = "Continue à chercher dans le musée !";
      }
      afficherEcran('ecranCheat');
      return;
    }

    // Charger l'étape
    etapeData = GAME.getEtapeCourante();
    if (!etapeData) {
      window.location.href = 'victoire.html';
      return;
    }

    // Note: on ne sauvegarde plus l'URL enigme dans sessionStorage
    // pour éviter que le bouton "Retour au jeu" de progression.html
    // ne déclenche validerEtape() sans scan de QR

    questionData = etapeData.questions && etapeData.questions.enfant !== null
      ? GAME.getQuestion(etapeData, session)
      : null;

    // Mettre à jour la progression
    const pct = GAME.getProgression();
    document.getElementById('progressionFill').style.width = pct + '%';
    document.getElementById('progressionLabel').textContent = 'Progression : ' + pct + '%';

    // Charger la vidéo d'intro
    // Pour l'Horloge 1759, la videoIntro dépend du parcours et niveau
    if (etapeData.bifurcation) {
      const niveau = session.parcours === 'enfants' ? 'enfant' : 'famille';
      const variante = session.parcours === 'pmr' ? 'pmr' : 'classique';
      const q = etapeData.questions[niveau][variante];
      if (q && q.videoIntro) etapeData.videoIntro = q.videoIntro;
    }

    if (etapeData.videoIntro) {
      const configMusique = MUSIQUES[etapeData.id];
      if (configMusique && etapeData.id !== 'intro-guide') {
        // Splash → clic → musique + vidéo (comportement standard)
        document.getElementById('splashPersonnage').textContent = etapeData.personnage;
        document.getElementById('splashMessage').textContent = "Prépare-toi... une nouvelle rencontre t'attend.";
        afficherEcran('ecranSplash');
      } else {
        chargerVideo('videoPlayer', etapeData.videoIntro);
        afficherEcran('ecranVideo');
        demarrerMusique(etapeData.id);
      }
    } else {
      // Pas de vidéo intro → splash quand même pour déclencher la musique au clic
      if (!questionData) {
        // Lampe magique : splash puis vidéo de fin
        document.getElementById('splashPersonnage').textContent = etapeData.personnage;
        document.getElementById('splashMessage').textContent = "Prépare-toi... la dernière rencontre t'attend.";
        afficherEcran('ecranSplash');
      } else {
        afficherQuestion();
      }
    }
  };

  // ── Afficher la question ──
  function montrerFleche() {
    var f = document.getElementById('flecheScroll');
    if (f) f.classList.add('visible');
  }

  function cacherFleche() {
    var f = document.getElementById('flecheScroll');
    if (f) f.classList.remove('visible');
  }

  function scrollBas() {
    montrerFleche();
  }

  function toggleCalc() {
    const panel = document.getElementById('miniCalc');
    const btn   = document.getElementById('btnCalc');
    const open  = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    btn.style.borderColor = open ? '#8a8070' : '#3a3530';
    btn.style.color       = open ? '#f0ead8'  : '#8a8070';
    // Changer icône couleur
    const ico = btn.querySelector('svg');
    if (ico) ico.style.stroke = open ? '#f0ead8' : '#8a8070';
  }

  function calculer() {
    const a  = parseFloat(document.getElementById('calcA').value);
    const b  = parseFloat(document.getElementById('calcB').value);
    const op = document.getElementById('calcOp').value;
    if (isNaN(a) || isNaN(b)) { document.getElementById('calcResultat').textContent = '?'; return; }
    let res;
    if (op === 'div') res = b !== 0 ? a / b : '∞';
    if (op === 'mul') res = a * b;
    if (op === 'add') res = a + b;
    if (op === 'sub') res = a - b;
    if (typeof res === 'number') res = Math.round(res * 10000) / 10000;
    document.getElementById('calcResultat').textContent = '= ' + res;
    // Ajouter à l'historique
    const opSym = {div:'÷', mul:'×', add:'+', sub:'−'}[op];
    const histo = document.getElementById('calcHistorique');
    histo.textContent += (histo.textContent ? '  →  ' : '') + a + ' ' + opSym + ' ' + b + ' = ' + res;
    // Afficher bouton réutiliser
    const btnR = document.getElementById('btnReutiliser');
    btnR.style.display = 'block';
    btnR.dataset.val = res;
  }

  function reutiliserResultat() {
    const val = document.getElementById('btnReutiliser').dataset.val;
    document.getElementById('calcA').value = val;
    document.getElementById('calcB').value = '';
    document.getElementById('calcResultat').textContent = '';
    document.getElementById('btnReutiliser').style.display = 'none';
    document.getElementById('calcA').focus();
  }

  // Mots-clés qui déclenchent l'affichage de la calculette
  const QUESTIONS_CALC = ['longitude', 'chronomètre', 'Greenwich', 'clepsydre', 'fuseaux'];

  function afficherQuestion() {
    session = GAME.getSession();



    document.getElementById('personnageNom').textContent = etapeData.personnage;
    document.getElementById('questionTexte').textContent = questionData.texte;

    // Compteur d'erreurs
    majCompteurErreurs();

    // Générer les boutons de réponse
    const liste = document.getElementById('choixListe');
    liste.innerHTML = '';
    const erreursActuelles = GAME.getSession().erreurs;
    const dejaTentes = JSON.parse(localStorage.getItem('dejaTentes') || '[]');
    questionData.choix.forEach(function(choix, index) {
      const btn = document.createElement('button');
      btn.className = 'btn-choix';
      btn.textContent = choix;
      // Griser les choix déjà tentés (mauvaises réponses précédentes)
      if (dejaTentes.includes(index)) {
        btn.disabled = true;
        btn.style.opacity = '0.3';
        btn.style.textDecoration = 'line-through';
      } else {
        btn.onclick = function() { verifierReponse(index); };
      }
      liste.appendChild(btn);
    });

    // Calculette : afficher/masquer selon la question
    var calcZone = document.getElementById('calcZone');
    if (calcZone && typeof QUESTIONS_CALC !== 'undefined') {
      var needsCalc = QUESTIONS_CALC.some(function(kw) {
        return questionData.texte.toLowerCase().indexOf(kw.toLowerCase()) >= 0;
      });
      calcZone.style.display = needsCalc ? 'block' : 'none';
      var mc = document.getElementById('miniCalc');
      if (mc) mc.style.display = 'none';
      var cr = document.getElementById('calcResultat');
      if (cr) cr.textContent = '';
      var ch = document.getElementById('calcHistorique');
      if (ch) ch.textContent = '';
      var br = document.getElementById('btnReutiliser');
      if (br) br.style.display = 'none';
      var ca = document.getElementById('calcA');
      if (ca) ca.value = '';
      var cb2 = document.getElementById('calcB');
      if (cb2) cb2.value = '';
      // Remettre le bouton dans son état fermé
      var btnC = document.getElementById('btnCalc');
      if (btnC) { btnC.style.borderColor = '#3a3530'; btnC.style.color = '#8a8070'; }
    }

    afficherEcran('ecranQuestion');

    // Scroll vers le haut à chaque nouvelle question
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Vérifier la réponse ──
  function verifierReponse(indexChoisi) {

    // Désactiver tous les boutons (évite double-clic)
    document.querySelectorAll('.btn-choix').forEach(function(b) {
      b.disabled = true;
    });

    // Colorer le bouton cliqué
    const btnsClic = document.querySelectorAll('.btn-choix');
    if (indexChoisi === questionData.bonne) {
      btnsClic[indexChoisi].style.borderColor = '#a8c8a0';
      btnsClic[indexChoisi].style.color = '#a8c8a0';
    } else {
      btnsClic[indexChoisi].style.borderColor = '#c89090';
      btnsClic[indexChoisi].style.color = '#c89090';
      btnsClic[indexChoisi].classList.add('anim-shake');
    }

    if (indexChoisi === questionData.bonne) {
      // ✅ BONNE RÉPONSE
      bonneReponse = true;

      if (etapeData.videoBonneReponse) {
        chargerVideo('videoFeedback', etapeData.videoBonneReponse);
        document.getElementById('messageFeedback').innerHTML =
          '<span class="feedback-ok">✅ Bravo ! Bonne réponse !</span>';
        document.getElementById('btnApresReponse').textContent = 'Continuer ▶';
        document.getElementById('btnApresReponse').classList.remove('cache');
      scrollBas();
        scrollBas();
        afficherEcran('ecranFeedback');
        // Animation bonne réponse
        const feedback = document.getElementById('messageFeedback');
        feedback.classList.remove('anim-shake', 'anim-slide-up');
        void feedback.offsetWidth;
        feedback.classList.add('anim-slide-up');
      } else {
        // Pas de vidéo de feedback → aller direct à l'indice
        afficherIndice();
      }

    } else {
      // ❌ MAUVAISE RÉPONSE
      bonneReponse = false;
      const nbErreurs = GAME.ajouterErreur();
      session = GAME.getSession();
      // Mémoriser ce mauvais choix pour le barrer au retour
      const dejaTentes = JSON.parse(localStorage.getItem('dejaTentes') || '[]');
      if (!dejaTentes.includes(indexChoisi)) dejaTentes.push(indexChoisi);
      localStorage.setItem('dejaTentes', JSON.stringify(dejaTentes));

      const indexVideo = Math.min(nbErreurs - 1, etapeData.videsMauvaisesReponses.length - 1);
      const videoErreur = etapeData.videsMauvaisesReponses[indexVideo];

      if (videoErreur) {
        chargerVideo('videoFeedback', videoErreur);
      }

      if (nbErreurs >= 2) {
        // 2 erreurs atteintes → on indique que c'est la dernière chance
        // mais le joueur DOIT quand même cliquer la bonne réponse lui-même
        document.getElementById('messageFeedback').innerHTML =
          '<span class="feedback-erreur">❌ Encore raté ! Regarde bien et trouve la bonne réponse...</span>';
        document.getElementById('btnApresReponse').textContent = 'Réessayer ▶';
        bonneReponse = false; // Le joueur doit encore trouver la bonne réponse
      } else {
        document.getElementById('messageFeedback').innerHTML =
          '<span class="feedback-erreur">❌ Pas tout à fait... Encore un essai !</span>';
        document.getElementById('btnApresReponse').textContent = 'Réessayer ▶';
      }

      document.getElementById('btnApresReponse').classList.remove('cache');
      scrollBas();
      afficherEcran('ecranFeedback');
      // Animation mauvaise réponse
      const card = document.querySelector('#ecranFeedback .video-wrapper, #ecranFeedback');
      const feedback = document.getElementById('messageFeedback');
      feedback.classList.remove('anim-shake', 'anim-slide-up');
      void feedback.offsetWidth; // reset animation
      feedback.classList.add('anim-shake');
    }
  }

  // ── Après la vidéo de feedback ──
  function apresReponse() {
    if (bonneReponse) {
      afficherIndice();
    } else {
      afficherQuestion();
      lancerCascade();
    }
  }

  // ── Afficher l'indice (prochain QR à trouver) ──
  function afficherIndice() {
    // Marque l'étape comme réussie (indiceAffiche=true) sans avancer
    // L'avancement réel se fera au prochain scan de QR
    GAME.avancer();
    session = GAME.getSession();
    localStorage.removeItem('dejaTentes');

    // Mettre à jour la barre de progression (getProgression compte +1 si indiceAffiche)
    const pct = GAME.getProgression();
    document.getElementById('progressionFill').style.width = pct + '%';
    document.getElementById('progressionLabel').textContent = 'Progression : ' + pct + '%';

    let indice = etapeData.indice;
    if (typeof indice === 'object') {
      indice = session.parcours === 'pmr' ? indice.pmr : indice.classique;
    }

    // Arrêter la musique
    if (musique) {
      musique.pause();
      musique.currentTime = 0;
    }

    // Si pas d'indice = dernière étape → aller à la victoire
    if (!indice) {
      // C'est la fin ! On valide directement et on redirige
      GAME.validerEtape();
      setTimeout(function() {
        window.location.href = 'victoire.html';
      }, 1500);
      document.getElementById('indiceTexte').textContent = "Bravo, tu as terminé !";
      afficherEcran('ecranIndice');
      return;
    }

    document.getElementById('indiceTexte').textContent = indice;
    // Rediriger vers le plan avec animation jaune→vert après 1.5s
    setTimeout(function() {
      window.location.href = 'progression.html?mode=reussi';
    }, 1500);
    afficherEcran('ecranIndice');
  }

  // ── Démarrer la musique selon l'étape ──
  // ── Lancer depuis le splash (musique + vidéo au même tap) ──
  function lancerDepuisSplash() {
    demarrerMusique(etapeData.id);
    chargerVideo('videoPlayer', etapeData.videoIntro);
    afficherEcran('ecranVideo');
  }

  function demarrerMusiqueEtLancerQuestion() {
    if (!questionData) {
      // Pas de question → aller direct à l'indice (ex: Lampe magique)
      afficherIndice();
    } else {
      afficherQuestion();
      lancerCascade();
    }
  }

  function lancerCascade() {
    var carte = document.getElementById('ecranQuestion').querySelector('.question-card');
    carte.classList.remove('card-animate');
    void carte.offsetWidth; // reset
    carte.classList.add('card-animate');
  }

  function demarrerMusique(idEtape) {
    const config = MUSIQUES[idEtape];
    if (!config) return;
    if (musique) { musique.pause(); musique = null; }
    musique = new Audio(config.fichier);
    musique.loop        = true;
    musique.volume      = 0.18;
    musique.currentTime = config.debut;
    // Tentative immédiate (fonctionne sur PC et certains Android)
    musique.play().catch(function() {
      // Bloqué par le navigateur → on attend le premier tap ou clic
      function debloquer() {
        if (musique) musique.play();
        document.removeEventListener('touchstart', debloquer);
        document.removeEventListener('click', debloquer);
      }
      document.addEventListener('touchstart', debloquer, { once: true });
      document.addEventListener('click', debloquer, { once: true });
    });
  }

  // ── Helpers ──
  // Délais avant d'afficher la flèche — uniquement pour les écrans avec vidéo
  var DELAIS_BTN = { ecranSplash:3000, ecranVideo:8000 };
  var _timerFleche = null;

  function afficherEcran(idEcran) {
    document.querySelectorAll('.ecran').forEach(function(e) {
      e.classList.add('cache');
    });
    document.getElementById(idEcran).classList.remove('cache');

    // Toujours cacher la flèche en changeant d'écran
    cacherFleche();
    if (_timerFleche) { clearTimeout(_timerFleche); _timerFleche = null; }

    var delai = DELAIS_BTN[idEcran];
    if (delai) {
      // Écrans vidéo : cacher le bouton puis révéler avec la flèche après délai
      var ids = {ecranSplash:'btnSplash', ecranVideo:'btnSuiteVideo', ecranFeedback:'btnApresReponse'};
      var btn = document.getElementById(ids[idEcran]);
      if (btn) btn.style.visibility = 'hidden';
      _timerFleche = setTimeout(function() {
        if (btn) btn.style.visibility = 'visible';
        montrerFleche();
      }, delai);
    }
    // Écrans sans vidéo (question, indice, cheat) : pas de flèche, bouton visible normalement
  }

  function chargerVideo(idPlayer, url) {
    // Convertir URL YouTube Shorts en embed
    let embedUrl = url;
    embedUrl = embedUrl.replace('youtube.com/shorts/', 'youtube.com/embed/');
    embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
    // Nettoyer les paramètres après ?
    embedUrl = embedUrl.split('?')[0];
    embedUrl += '?autoplay=1&rel=0&vq=hd1080&playsinline=1';
    document.getElementById(idPlayer).src = embedUrl;
  }

  // ── Retour à l'étape courante (après tentative de triche) ──
  function retourEtapeCourante() {
    const s = GAME.getSession();
    // Si pas de session → accueil
    if (!s.parcours) {
      window.location.href = 'index.html';
      return;
    }
    // Récupérer l'étape actuelle et y retourner
    const etape = GAME.getEtapeCourante();
    if (etape) {
      window.location.href = 'enigme.html?etape=' + etape.id;
    } else {
      window.location.href = 'index.html';
    }
  }

  function majCompteurErreurs() { /* supprimé — plus de compteur coeurs */ }

</script>

<style id="ripple-global">
.ripple-dot {
  position: fixed;
  border-radius: 50%;
  background: rgba(240, 234, 216, 0.25);
  transform: scale(0);
  pointer-events: none;
  z-index: 99999;
  animation: rippleGlobal 0.6s ease-out forwards;
}
@keyframes rippleGlobal {
  from { transform: scale(0); opacity: 0.5; }
  to   { transform: scale(6); opacity: 0; }
}

/* ── FLÈCHE SCROLL ── */
#flecheScroll {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  pointer-events: all;
}
@keyframes clignote {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.08; }
}
#flecheScroll.visible {
  display: flex;
  animation: clignote 0.9s ease-in-out infinite;
}
#flecheScroll svg { width: 36px; height: 36px; }
#flecheScroll span {
  font-size: 9px; color: #c8a842;
  letter-spacing: 2px; text-transform: uppercase;
}
</style>
<script>
document.addEventListener('click', function(e) {
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (e.clientX - size / 2) + 'px';
  dot.style.top    = (e.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
});
document.addEventListener('touchstart', function(e) {
  const touch = e.touches[0];
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const size = 40;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';
  dot.style.left   = (touch.clientX - size / 2) + 'px';
  dot.style.top    = (touch.clientY - size / 2) + 'px';
  document.body.appendChild(dot);
  dot.addEventListener('animationend', function() { dot.remove(); });
}, { passive: true });
</script>
